# Default values for hypershift-install chart
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# All values are namespaced under 'hypershift' to maintain consistency
# with the rendering system and avoid conflicts with other charts
hypershift:
  # AWS region — used by the ASCP SecretProviderClass to fetch from Secrets Manager
  region: us-east-1

  # External DNS domain filter — set from config via render.py
  externalDns:
    domain: ""
    image: registry.redhat.io/edo/external-dns-rhel9:c8f7fbd233b9fbcc312672a6e5afd020655c791f

  # Hypershift configuration
  hypershift:
    # Self-built image on top of hypershift main adding:
    # - aws-iam-authenticator KAS sidecar injection and webhook redirect (CPO)
    # - aws-iam-auth-config ConfigMap sync from HC to HCP namespace (HC controller)
    # - hypershift.openshift.io/aws-iam-authenticator annotation propagation
    # Branch: https://github.com/typeid/hypershift/tree/aws-iam-authenticator-poc
    image: quay.io/cbusse_openshift/hypershift-operator:aws-iam-auth
