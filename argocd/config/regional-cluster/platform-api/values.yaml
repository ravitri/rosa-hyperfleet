# Default values for platform-api

global:
  git_revision: "unknown"

platformApi:
  # Namespace to deploy into
  namespace: platform-api

  # Service Account configuration
  serviceAccount:
    create: true
    name: platform-api-sa
    annotations: {}

  # Application configuration
  app:
    name: platform-api
    image:
      repository: quay.io/travi/rosa-hyperfleet-api
      tag: "ratelimit"
      pullPolicy: Always

    # Application arguments
    args:
      logLevel: info
      logFormat: json
      maestroUrl: http://maestro-http.maestro-server:8080
      allowedAccounts: "123456789012"
      dynamodbRegion: us-east-2
      dynamodbPrefix: rosa
      apiPort: 8000
      healthPort: 8081
      metricsPort: 9090

    # Resources for the main app container
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

  # Envoy sidecar configuration
  envoy:
    image:
      repository: envoyproxy/envoy
      tag: v1.31-latest

    # Resources for the Envoy sidecar
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 256Mi

  # Deployment configuration
  deployment:
    replicas: 2

  # Service configuration
  service:
    type: ClusterIP
    ports:
      http: 8080
      api: 8000
      health: 8081
      metrics: 9090

  # Target Group configuration
  targetGroup:
    arn: "PLACEHOLDER"
    targetType: ip

  # ZOA (Zero Operator Access) configuration
  zoa:
    enabled: true
    tableName: ""
    auditTableName: ""
    bucketName: ""
    jobImage: "quay.io/slopezz/zoa-tools:e777d69"
    ttlSeconds: "3600"
    executionTimeoutSeconds: "1800"
    writeCooldownSeconds: "300"
    maxConcurrentPerTarget: "10"
    dynamodbTTLDays: "365"
    jobResources:
      requests:
        cpu: "25m"
        memory: "64Mi"
      limits:
        cpu: "250m"
        memory: "256Mi"

  # ServiceMonitor for Prometheus scraping
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
    labels: {}

  # Rate Limiting configuration
  rateLimit:
    enabled: true
    redisEndpoint: ""
    config: |
      enabled: true
      exemptAccounts: []
      default:
        rate: 20
        burst: 40
      routes:
        - path: "/api/v0/clusters"
          method: POST
          rate: 5
          burst: 10
        - path: "/api/v0/clusters"
          method: GET
          rate: 20
          burst: 40
        - path: "/api/v0/clusters/*"
          method: GET
          rate: 30
          burst: 60
        - path: "/api/v0/clusters/*"
          method: PATCH
          rate: 10
          burst: 20
        - path: "/api/v0/clusters/*"
          method: DELETE
          rate: 5
          burst: 10
        - path: "/api/v0/nodepools"
          method: POST
          rate: 10
          burst: 20
        - path: "/api/v0/nodepools"
          method: GET
          rate: 20
          burst: 40
        - path: "/api/v0/nodepools/*"
          method: GET
          rate: 30
          burst: 60
        - path: "/api/v0/nodepools/*"
          method: PATCH
          rate: 10
          burst: 20
        - path: "/api/v0/trusted-actions/*/run"
          method: POST
          rate: 20
          burst: 30

  # Health probe configuration
  probes:
    liveness:
      initialDelaySeconds: 10
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    readiness:
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      failureThreshold: 3
