evaluation_interval: 1m

rule_files:
  - rules.yaml

tests:
  # RateLimitValkeyDown fires when failure_mode_allowed requests appear for > 2m
  - interval: 1m
    input_series:
      - series: 'ratelimit_requests_total{result="failure_mode_allowed", method="GET", path="/api/v0/clusters"}'
        values: "0+1x10"
    alert_rule_test:
      - eval_time: 3m
        alertname: RateLimitValkeyDown
        exp_alerts:
          - exp_labels:
              severity: critical
              method: GET
              path: /api/v0/clusters
              result: failure_mode_allowed
            exp_annotations:
              summary: "Rate limiting is bypassed — Valkey unreachable"
              description: "Platform API rate limiter is failing open because Valkey (ElastiCache) is unreachable. All requests are being allowed without rate limiting. Method=GET, path=/api/v0/clusters."

  # RateLimitValkeyDown does NOT fire when there are no failure_mode_allowed requests
  - interval: 1m
    input_series:
      - series: 'ratelimit_requests_total{result="ok", method="GET", path="/api/v0/clusters"}'
        values: "0+10x10"
    alert_rule_test:
      - eval_time: 5m
        alertname: RateLimitValkeyDown
        exp_alerts: []

  # RateLimitHighDenialRatio fires when > 50% of requests are over_limit for > 10m
  - interval: 1m
    input_series:
      - series: 'ratelimit_requests_total{result="over_limit", method="GET", path="/api/v0/clusters"}'
        values: "0+6x20"
      - series: 'ratelimit_requests_total{result="ok", method="GET", path="/api/v0/clusters"}'
        values: "0+4x20"
    alert_rule_test:
      - eval_time: 11m
        alertname: RateLimitHighDenialRatio
        exp_alerts:
          - exp_labels:
              severity: warning
              method: GET
              path: /api/v0/clusters
            exp_annotations:
              summary: "Over 50% of requests are being rate limited"
              description: "More than 50% of rate-limited requests on method=GET, path=/api/v0/clusters have been denied for over 10 minutes. This may indicate a misbehaving client or rate limits that need tuning."

  # RateLimitHighDenialRatio fires when combined ratio across pods exceeds 50%
  # Pod A: 3 denied + 7 ok = 30% per pod, Pod B: 4 denied + 2 ok = 67% per pod
  # Combined: 7 denied / 16 total = 43.75% — does NOT fire (under 50%)
  # But with higher combined: Pod A: 5 denied + 3 ok, Pod B: 4 denied + 2 ok
  # Combined: 9 denied / 14 total = 64% — fires
  - interval: 1m
    input_series:
      - series: 'ratelimit_requests_total{result="over_limit", method="GET", path="/api/v0/clusters", pod="api-0"}'
        values: "0+5x20"
      - series: 'ratelimit_requests_total{result="ok", method="GET", path="/api/v0/clusters", pod="api-0"}'
        values: "0+3x20"
      - series: 'ratelimit_requests_total{result="over_limit", method="GET", path="/api/v0/clusters", pod="api-1"}'
        values: "0+4x20"
      - series: 'ratelimit_requests_total{result="ok", method="GET", path="/api/v0/clusters", pod="api-1"}'
        values: "0+2x20"
    alert_rule_test:
      - eval_time: 11m
        alertname: RateLimitHighDenialRatio
        exp_alerts:
          - exp_labels:
              severity: warning
              method: GET
              path: /api/v0/clusters
            exp_annotations:
              summary: "Over 50% of requests are being rate limited"
              description: "More than 50% of rate-limited requests on method=GET, path=/api/v0/clusters have been denied for over 10 minutes. This may indicate a misbehaving client or rate limits that need tuning."

  # RateLimitHighDenialRatio does NOT fire when denial ratio is below 50%
  # over_limit is 10% of total traffic (1 denied per 9 ok)
  - interval: 1m
    input_series:
      - series: 'ratelimit_requests_total{result="over_limit", method="GET", path="/api/v0/clusters"}'
        values: "0+1x20"
      - series: 'ratelimit_requests_total{result="ok", method="GET", path="/api/v0/clusters"}'
        values: "0+9x20"
    alert_rule_test:
      - eval_time: 15m
        alertname: RateLimitHighDenialRatio
        exp_alerts: []

  # RateLimitHighDenialRatio does NOT fire before 10m even with high denial ratio
  - interval: 1m
    input_series:
      - series: 'ratelimit_requests_total{result="over_limit", method="GET", path="/api/v0/clusters"}'
        values: "0+9x8"
      - series: 'ratelimit_requests_total{result="ok", method="GET", path="/api/v0/clusters"}'
        values: "0+1x8"
    alert_rule_test:
      - eval_time: 8m
        alertname: RateLimitHighDenialRatio
        exp_alerts: []
